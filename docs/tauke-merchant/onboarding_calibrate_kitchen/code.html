<script>
        // Micro-interaction for Prep Time Tiles
        const tiles = document.querySelectorAll('.prep-tile');
        
        tiles.forEach(tile => {
            tile.addEventListener('click', () => {
                // Reset all tiles
                tiles.forEach(t => {
                    t.setAttribute('data-selected', 'false');
                    t.classList.remove('bg-secondary-container', 'border-secondary', 'shadow-none', 'translate-y-[2px]');
                    t.classList.add('bg-surface-container-lowest', 'border-on-surface', 'brutal-shadow', 'brutal-active');
                    const textNode = t.querySelector('.text-on-secondary-container');
                    if(textNode) textNode.classList.remove('text-on-secondary-container');
                });
                
                // Set active tile
                tile.setAttribute('data-selected', 'true');
                tile.classList.remove('bg-surface-container-lowest', 'border-on-surface', 'brutal-shadow', 'brutal-active');
                tile.classList.add('bg-secondary-container', 'border-secondary', 'shadow-none', 'translate-y-[2px]');
                tile.querySelector('.text-body-lg').classList.add('text-on-secondary-container');
            });
        });

        // Toggle Switch visual logic is handled largely by CSS, 
        // but we need to move the 'dot' specifically based on checked state
        const checkboxes = document.querySelectorAll('.toggle-checkbox');
        checkboxes.forEach(box => {
            const updateDot = () => {
                const dot = box.nextElementSibling.querySelector('.dot');
                if(box.checked) {
                    dot.style.transform = 'translateX(24px)';
                } else {
                    dot.style.transform = 'translateX(0)';
                }
            };
            // Initial state
            updateDot();
            // On change
            box.addEventListener('change', updateDot);
        });
    </script>
