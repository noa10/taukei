<script>
        // Password Visibility Toggle Logic
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('passcode');
            const passwordIcon = document.getElementById('passwordIcon');

            toggleButton.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                
                // Toggle input type
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                
                // Toggle icon (eye to smiley as requested, using material symbols)
                // 'visibility' is the eye, 'mood' is a smiley face
                passwordIcon.textContent = isPassword ? 'mood' : 'visibility';
                passwordIcon.setAttribute('data-icon', isPassword ? 'mood' : 'visibility');
                
                // Add a playful little bounce to the icon
                passwordIcon.classList.add('scale-125', 'text-primary-container');
                setTimeout(() => {
                    passwordIcon.classList.remove('scale-125', 'text-primary-container');
                }, 150);
            });

            // Prevent form submit for demo purposes
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">refresh</span> Launching...';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    // In a real app, redirect would happen here
                }, 1500);
            });
        });
    </script>
