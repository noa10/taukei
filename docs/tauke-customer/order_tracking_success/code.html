<script>
        // Simple Confetti Animation
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff5a5f', '#6bfe9c', '#b52330', '#141b2b', '#ffffff'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Randomize properties
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100 + 'vw';
                const animationDuration = Math.random() * 3 + 2 + 's';
                const animationDelay = Math.random() * 2 + 's';
                
                confetti.style.backgroundColor = color;
                confetti.style.left = left;
                confetti.style.top = '-10px';
                
                if(color === '#ffffff') {
                    confetti.style.border = '1px solid #141b2b';
                }

                // Simple CSS animation via JS injection
                confetti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*100 - 50}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1500,
                    delay: Math.random() * 200,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });
                
                container.appendChild(confetti);
            }
        }
        
        // Run confetti on load
        window.addEventListener('load', createConfetti);
        
        // Simple Countdown Timer
        let time = 15;
        const countdownEl = document.getElementById('countdown');
        setInterval(() => {
            if(time > 1) {
                time--;
                countdownEl.innerText = time;
            }
        }, 60000); // update every minute
    </script>
